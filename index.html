<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Happy Monthsary ❤️</title>
  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', cursive;
      background: linear-gradient(to bottom right, #ffdde1, #ee9ca7);
      color: #fff;
      text-align: center;
      overflow-x: hidden;
    }

    .container {
      padding: 50px 20px;
      position: relative;
      z-index: 2;
    }

    h1 {
      font-size: 3em;
      margin-bottom: 10px;
      animation: fadeIn 2s ease-in-out;
    }

    h2 {
      font-weight: normal;
      margin-bottom: 30px;
      animation: fadeIn 3s ease-in-out;
    }

    .message {
      font-size: 1.2em;
      max-width: 600px;
      margin: auto;
      line-height: 1.6;
      min-height: 150px;
      border-right: 2px solid white;
      white-space: pre-wrap;
      overflow: hidden;
    }

    .heart {
      position: fixed;
      bottom: -10px;
      font-size: 20px;
      animation: floatUp 5s linear infinite;
      opacity: 0.7;
    }

    @keyframes floatUp {
      0% {
        transform: translateY(0) scale(1);
        opacity: 0.7;
      }
      100% {
        transform: translateY(-100vh) scale(1.5);
        opacity: 0;
      }
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .footer {
      margin-top: 40px;
      font-size: 1em;
      opacity: 0.9;
    }

    button {
      margin-top: 30px;
      padding: 12px 25px;
      border: none;
      border-radius: 25px;
      background: #fff;
      color: #ee9ca7;
      font-size: 1em;
      cursor: pointer;
      transition: 0.3s;
    }

    button:hover {
      background: #ffdde1;
    }

    .bg-music {
      position: fixed;
      bottom: 0;
      right: 0;
      width: 0;
      height: 0;
      border: 0;
      z-index: 1;
    }
  </style>
</head>
<body>

  <!-- Background Love Music -->
  <iframe class="bg-music" 
    src="https://www.youtube.com/embed/6p2tZ9z0z1A?autoplay=1&loop=1&playlist=6p2tZ9z0z1A">
  </iframe>

  <div class="container">
    <h1>Happy 1st Monthsary 💖</h1>
    <h2>Cath & Koeeeyyy 🥰</h2>

    <div id="letter" class="message"></div>

    <button onclick="showMessage()">Click me 💌</button>

    <div id="surprise" style="display:none; margin-top:20px; font-size:1.2em;">
      I love you more than words can ever express 💞
    </div>

    <div class="footer">
      Forever yours, Cath 💖
    </div>
  </div>

  <script>
    const text = `My dearest Koeeeyyy,

From the very beginning, you made my world brighter in ways I never imagined.
Every moment with you feels like a beautiful dream I never want to wake up from.

This past month has been full of love, laughter, and happiness, all because of you.
You are my comfort, my joy, and my favorite person.

No matter what happens, I promise to always be here for you, to love you endlessly,
and to choose you every single day.

Happy 1st monthsary, my baby.

Love always,
Cath ❤️`;

    let i = 0;
    function typeWriter() {
      if (i < text.length) {
        document.getElementById("letter").innerHTML += text.charAt(i);
        i++;
        setTimeout(typeWriter, 40);
      }
    }

    typeWriter();

    function showMessage() {
      document.getElementById('surprise').style.display = 'block';
    }

    // Floating hearts generator
    function createHeart() {
      const heart = document.createElement('div');
      heart.classList.add('heart');
      heart.innerHTML = '❤️';
      heart.style.left = Math.random() * 100 + 'vw';
      heart.style.animationDuration = (Math.random() * 3 + 3) + 's';
      document.body.appendChild(heart);

      setTimeout(() => {
        heart.remove();
      }, 5000);
    }

    setInterval(createHeart, 300);
  </script>
</body>
</html>
